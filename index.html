<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAFAF7">
<title>Noetune｜カスタム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Helvetica Neue','Hiragino Kaku Gothic ProN',sans-serif;background:#FAFAF7;color:#1A1A1A}
.progress-bar{position:fixed;top:0;left:0;height:2px;background:#6B9080;transition:width .6s cubic-bezier(.4,0,.2,1);z-index:100}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem 2rem;opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease;pointer-events:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{opacity:1;transform:translateY(0);pointer-events:all}
.screen.exit{opacity:0;transform:translateY(-12px)}
.label{font-size:.72rem;letter-spacing:.18em;color:#A0A09A;margin-bottom:1.2rem}
.title{font-family:'Noto Serif JP',serif;font-size:1.35rem;font-weight:300;text-align:center;line-height:2;margin-bottom:2rem;max-width:300px}
.score-num{font-family:'Noto Serif JP',serif;font-size:2.8rem;font-weight:700;line-height:1;margin-bottom:1.8rem}
.slider-wrap{width:100%;max-width:280px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:#D4DDD8;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;background:#6B9080;border-radius:50%;cursor:pointer;box-shadow:0 2px 8px rgba(107,144,128,.3)}
input[type=range]::-moz-range-thumb{width:32px;height:32px;background:#6B9080;border-radius:50%;cursor:pointer;border:none}
.slider-labels{display:flex;justify-content:space-between;margin-top:.6rem;font-size:.7rem;color:#BBB}
.text-input{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:300;text-align:center;border:none;border-bottom:1.5px solid #D4DDD8;background:transparent;padding:.6rem 1rem;width:92%;max-width:300px;outline:none;color:#1A1A1A;transition:border-color .3s}
.text-input:focus{border-bottom-color:#6B9080}
.text-input::placeholder{color:#CCC;font-weight:300}
.btn{margin-top:2rem;padding:14px 52px;background:#6B9080;color:#fff;border:none;border-radius:30px;font-size:.95rem;cursor:pointer;transition:opacity .3s,transform .15s;font-family:'Noto Serif JP',serif;letter-spacing:.08em}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:default}
.btn-ghost{margin-top:1rem;padding:11px 36px;background:transparent;color:#6B9080;border:1.5px solid #6B9080;border-radius:30px;font-size:.85rem;cursor:pointer;font-family:'Noto Serif JP',serif;letter-spacing:.08em;transition:all .25s}
.btn-ghost:active{background:#6B9080;color:#fff}
.btn-start{padding:16px 64px;background:#1A1A1A;color:#FAFAF7;border:none;border-radius:30px;font-size:1rem;cursor:pointer;font-family:'Noto Serif JP',serif;letter-spacing:.2em;transition:opacity .3s}
.btn-start:active{opacity:.7}
/* Corner grid */
.corner-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:300px;margin-bottom:1.6rem}
.corner-btn{position:relative;padding:1.4rem .8rem 1.2rem;background:#fff;border:1.5px solid #E4E4DE;border-radius:18px;cursor:pointer;transition:all .25s;text-align:center;font-family:'Noto Serif JP',serif;-webkit-tap-highlight-color:transparent;user-select:none}
.corner-btn:active{transform:scale(.96)}
.corner-btn.done{background:#F2F7F5;border-color:#A8C8BA}
.corner-btn .c-num{font-size:1.1rem;font-weight:500;color:#6B9080;margin-bottom:.4rem}
.corner-btn .c-label{font-size:.72rem;color:#AAA;letter-spacing:.05em;line-height:1.4}
.corner-btn .c-check{position:absolute;top:.6rem;right:.7rem;font-size:.8rem;color:#6B9080;opacity:0;transition:opacity .2s}
.corner-btn.done .c-check{opacity:1}
.corner-btn.done .c-label{color:#8BB5A2}
.corner-proceed{font-family:'Noto Serif JP',serif;font-size:.82rem;color:#B0B0A8;letter-spacing:.1em;cursor:pointer;background:none;border:none;padding:.5rem 1rem;margin-top:.4rem;transition:color .2s}
.corner-proceed:active{color:#6B9080}
/* Breathing */
.breath-focus{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:300;color:#888;text-align:center;line-height:1.9;margin-bottom:1.8rem;max-width:260px}
.breath-focus em{color:#1A1A1A;font-style:normal;font-weight:500}
.breath-circle{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#8BB5A2,#5A8A72);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-family:'Noto Serif JP',serif;font-size:1.5rem;font-weight:300;transition:transform 4s cubic-bezier(.4,0,.2,1),box-shadow 4s ease;box-shadow:0 4px 30px rgba(107,144,128,.15);cursor:pointer}
.breath-circle.inhale{transform:scale(1.5);box-shadow:0 8px 50px rgba(107,144,128,.25)}
.breath-circle.exhale{transform:scale(1)}
/* Intro */
.intro-title{font-family:'Noto Serif JP',serif;font-size:2.8rem;font-weight:700;letter-spacing:.15em;color:#1A1A1A;margin-bottom:.3rem}
.intro-sub{font-size:.78rem;color:#AAA;letter-spacing:.2em;margin-bottom:.4rem}
.prev-badge{font-size:.72rem;color:#B0B0A8;letter-spacing:.05em;font-family:'Noto Serif JP',serif;margin-bottom:2rem}
.prev-badge span{color:#6B9080}
.today-badge{font-size:.72rem;color:#6B9080;letter-spacing:.06em;font-family:'Noto Serif JP',serif;margin-bottom:.25rem}
/* Result */
.result-block{text-align:center;max-width:300px;width:100%}
.score-pair{display:flex;justify-content:center;gap:2.4rem;margin-bottom:.8rem}
.score-cell .slabel{font-size:.68rem;color:#AAA;letter-spacing:.1em;margin-bottom:.3rem}
.score-cell .sval{font-family:'Noto Serif JP',serif;font-size:1.8rem;font-weight:700}
.score-cell .sval.anshin{color:#6B9080}
.score-cell .sval.fuan{color:#C47A5A}
.score-section-label{font-size:.66rem;color:#CCC;letter-spacing:.18em;margin-bottom:.6rem}
.score-divider{width:32px;height:1px;background:#E0E0DA;margin:1rem auto}
/* PWA */
.pwa-prompt{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EEE;padding:1rem 1.5rem 1.3rem;display:none;flex-direction:column;align-items:center;gap:.7rem;z-index:300;animation:slideUp .35s ease}
.pwa-prompt.show{display:flex}
.pwa-text{font-size:.78rem;color:#888;text-align:center;letter-spacing:.04em}
.pwa-btns{display:flex;gap:.7rem}
.pwa-add{padding:10px 28px;background:#1A1A1A;color:#fff;border:none;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:'Noto Serif JP',serif;letter-spacing:.1em}
.pwa-later{padding:10px 20px;background:transparent;color:#AAA;border:1px solid #DDD;border-radius:20px;font-size:.8rem;cursor:pointer;font-family:'Noto Serif JP',serif}
.btn-back{position:fixed;top:1rem;left:1rem;width:36px;height:36px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;z-index:200}
.btn-back.visible{opacity:1;pointer-events:all}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.pulse{animation:pulse 2s infinite}
@media(max-height:640px){.title{font-size:1.2rem;margin-bottom:1.5rem}.score-num{font-size:2.2rem}.breath-circle{width:110px;height:110px}.screen{padding:2rem 1.2rem 1.5rem}.corner-btn{padding:1rem .6rem .9rem}}

.label .ph{color:#1A1A1A;font-weight:500}
.label .sep{color:#D8D8D2;margin:0 .3em}
.ar-val.anshin{color:#6B9080}
.ar-val.fuan{color:#C47A5A}


.r-row{display:flex;align-items:center;justify-content:center;gap:.55rem;margin-bottom:1.8rem}
.r-label{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:500;letter-spacing:.05em;min-width:2.6rem;text-align:right}
.r-arrow{display:flex;align-items:center;flex-shrink:0}
.r-nums{display:flex;align-items:baseline;gap:.1rem;font-family:'Noto Serif JP',serif;font-size:2.2rem;font-weight:700}
.r-before{opacity:.38;font-size:1.4rem}
.r-sep{font-size:1.1rem;color:#CCC;margin:0 .25rem;font-weight:300;font-family:sans-serif}
.r-after{}

.qr-overlay{position:fixed;inset:0;background:rgba(250,250,247,.96);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;animation:fadeInUp .3s ease}
.qr-overlay.show{display:flex}
.qr-close{position:absolute;top:1.2rem;right:1.4rem;background:none;border:none;font-size:1.4rem;color:#BBB;cursor:pointer;line-height:1}
.qr-tagline{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:300;color:#888;letter-spacing:.1em;margin-bottom:1.6rem}
.qr-box{padding:16px;background:#fff;border-radius:12px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.qr-url{font-size:.65rem;color:#C0C0B8;margin-top:1rem;letter-spacing:.08em}

.theme-list{display:flex;flex-direction:column;gap:14px;width:100%;max-width:272px}
.theme-btn{padding:1.1rem 1.4rem;border-radius:16px;border:none;text-align:left;transition:all .2s;width:100%}
.theme-btn.t-active{background:#1A1A1A;color:#FAFAF7;cursor:pointer}
.theme-btn.t-active:active{opacity:.85}
.theme-btn.t-locked{background:#F5F5F2;color:#C0C0BA;cursor:default}
.th-main{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:500;letter-spacing:.06em;display:block}
.th-sub{font-family:'Noto Serif JP',serif;font-size:.62rem;letter-spacing:.1em;display:block;margin-top:.35rem}
.theme-btn.t-active .th-sub{color:rgba(255,255,255,.45)}
.theme-btn.t-locked .th-sub{color:#C8C8C2}
</style>
</head>
<body>

<button class="btn-back" id="btn-back" onclick="goBack()">
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M14 5L8 11L14 17" stroke="#999" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>
<div class="progress-bar" id="progress"></div>

<!-- Intro -->
<div class="screen active" id="s-intro">
  <div class="intro-title" style="margin-bottom:0">Noetune</div>
  <div style="height:20px"></div>
  <div style="font-size:.68rem;color:#AAA;letter-spacing:.2em;font-family:'Noto Serif JP',serif;font-weight:300">— カスタム版 —</div>
  <div style="height:28px"></div>
  <div style="font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:300;color:#444;letter-spacing:.3em">カスタム</div>
  <div style="height:36px"></div>
  <div class="today-badge" id="today-badge" style="display:none;margin-top:.4rem">今日：✓</div>
  <div class="prev-badge" id="prev-badge" style="display:none;margin-top:.3rem">前回：<span id="prev-text"></span></div>
  <div style="height:1.8rem" id="intro-spacer"></div>
  <button class="btn-start" onclick="startFresh()">3分ワークを始める</button>
  <button class="btn-resume" id="resume-btn" style="display:none" onclick="resumeSession()">続きから始める</button>
</div>

<!-- Theme Select -->
<div class="screen" id="s-theme-select">
  <div class="label">カスタム入力</div>
  <div class="theme-list" id="theme-list"></div>
</div>

<!-- Word Input -->
<div class="screen" id="s-words">
  <div class="label">2つの言葉を入れる</div>
  <div style="width:100%;max-width:272px;display:flex;flex-direction:column;gap:1.4rem">
    <div>
      <div style="font-size:.68rem;color:#AAA;letter-spacing:.1em;margin-bottom:.5rem;font-family:'Noto Serif JP',serif">ポジティブな言葉</div>
      <input class="text-input" id="word-pos" placeholder="例：安心" autocomplete="off" style="width:100%">
    </div>
    <div>
      <div style="font-size:.68rem;color:#AAA;letter-spacing:.1em;margin-bottom:.5rem;font-family:'Noto Serif JP',serif">ネガティブな言葉</div>
      <input class="text-input" id="word-neg" placeholder="例：不安" autocomplete="off" style="width:100%">
    </div>
  </div>
  <button class="btn" id="btn-words" onclick="saveWords()" style="font-size:.88rem;padding:12px 44px;margin-top:2rem">次へ</button>
</div>

<!-- Init ポジティブワード -->
<div class="screen" id="s-ia">
  <div class="label" id="lbl-ia"></div>
  <div class="title">「<span id="t-ia-title"></span>」の強度は？</div>
  <div class="score-num" id="num-ia" style="color:#6B9080">0.000</div>
  <div class="slider-wrap">
    <input type="range" min="0" max="100" step="0.001" value="0" id="sl-ia" oninput="document.getElementById('num-ia').textContent=parseFloat(this.value).toFixed(3)">
    <div class="slider-labels"><span>0</span><span>100</span></div>
  </div>
  <button class="btn" onclick="onInitAnshin()">確定</button>
</div>

<!-- Init ネガティブワード -->
<div class="screen" id="s-if">
  <div class="label" id="lbl-if"></div>
  <div class="title">「<span id="t-if-title"></span>」の強度は？</div>
  <div class="score-num" id="num-if" style="color:#C47A5A">0.000</div>
  <div class="slider-wrap">
    <input type="range" min="0" max="100" step="0.001" value="0" id="sl-if" oninput="document.getElementById('num-if').textContent=parseFloat(this.value).toFixed(3)">
    <div class="slider-labels"><span>0</span><span>100</span></div>
  </div>
  <button class="btn" onclick="onInitFuan()">確定</button>
</div>

<!-- Corner Selection -->
<div class="screen" id="s-corners">
  <div class="label" id="lbl-corners-hdr"></div>
  <div class="corner-grid" id="corner-grid">
    <div class="corner-btn" id="cb-0" onclick="startCorner(0)">
      <div class="c-check">✓</div>
      <div class="c-num">①</div>
      <div class="c-label" id="cl-0"></div>
    </div>
    <div class="corner-btn" id="cb-1" onclick="startCorner(1)">
      <div class="c-check">✓</div>
      <div class="c-num">②</div>
      <div class="c-label" id="cl-1"></div>
    </div>
    <div class="corner-btn" id="cb-2" onclick="startCorner(2)">
      <div class="c-check">✓</div>
      <div class="c-num">③</div>
      <div class="c-label" id="cl-2"></div>
    </div>
    <div class="corner-btn" id="cb-3" onclick="startCorner(3)">
      <div class="c-check">✓</div>
      <div class="c-num">④</div>
      <div class="c-label" id="cl-3"></div>
    </div>
  </div>
  <button class="corner-proceed" onclick="goToFinal()">測定へ →</button>
</div>

<!-- Round A -->
<div class="screen" id="s-ra">
  <div class="label" id="lbl-ra"></div>
  <div class="title" id="title-ra"></div>
  <input class="text-input" id="input-ra" placeholder="" autocomplete="off">
  <button class="btn" id="btn-ra" disabled onclick="onRoundA()" style="opacity:.45;font-size:.82rem;padding:11px 36px">次へ</button>
  <button onclick="skipRound('a')" style="background:none;border:none;font-family:'Noto Serif JP',serif;font-size:.75rem;color:#C0C0B8;letter-spacing:.1em;cursor:pointer;margin-top:.8rem;padding:.3rem .8rem">スキップ</button>
</div>

<!-- Round B -->
<div class="screen" id="s-rb">
  <div class="label" id="lbl-rb"></div>
  <div class="title" id="title-rb"></div>
  <input class="text-input" id="input-rb" placeholder="" autocomplete="off">
  <button class="btn" id="btn-rb" disabled onclick="onRoundB()" style="opacity:.45;font-size:.82rem;padding:11px 36px">次へ</button>
  <button onclick="skipRound('b')" style="background:none;border:none;font-family:'Noto Serif JP',serif;font-size:.75rem;color:#C0C0B8;letter-spacing:.1em;cursor:pointer;margin-top:.8rem;padding:.3rem .8rem">スキップ</button>
</div>

<!-- Round C1 -->
<div class="screen" id="s-rc1">
  <div class="label" id="lbl-rc1"></div>
  <div class="breath-focus" id="focus-c1"></div>
  <div style="position:relative;display:inline-block">
    <div class="breath-circle pulse" id="circle-c1" onclick="startBreath('c1')"></div>
    <div id="hint-c1" style="position:absolute;bottom:-1.6rem;left:0;right:0;text-align:center;font-size:.7rem;color:#C0C0B8;letter-spacing:.1em;font-family:'Noto Serif JP',serif;pointer-events:none">触れる</div>
  </div>
</div>

<!-- Round C2 -->
<div class="screen" id="s-rc2">
  <div class="label" id="lbl-rc2"></div>
  <div class="breath-focus">この宇宙全てを感じながら<br>深呼吸1回</div>
  <div style="position:relative;display:inline-block">
    <div class="breath-circle pulse" id="circle-c2" onclick="startBreath('c2')"></div>
    <div id="hint-c2" style="position:absolute;bottom:-1.6rem;left:0;right:0;text-align:center;font-size:.7rem;color:#C0C0B8;letter-spacing:.1em;font-family:'Noto Serif JP',serif;pointer-events:none">触れる</div>
  </div>
</div>

<!-- Final ポジティブワード -->
<div class="screen" id="s-fa">
  <div class="label" id="lbl-fa"></div>
  <div class="title">「<span id="t-fa-title"></span>」の強度は？</div>
  <div class="score-num" id="num-fa" style="color:#6B9080">0.000</div>
  <div class="slider-wrap">
    <input type="range" min="0" max="100" step="0.001" value="0" id="sl-fa" oninput="document.getElementById('num-fa').textContent=parseFloat(this.value).toFixed(3)">
    <div class="slider-labels"><span>0</span><span>100</span></div>
  </div>
  <button class="btn" onclick="onFinalAnshin()">確定</button>
  <button class="btn-ghost" onclick="setMuryou()" style="margin-top:.8rem;font-size:.8rem">無量（測れない）</button>
</div>

<!-- Final ネガティブワード -->
<div class="screen" id="s-ff">
  <div class="label" id="lbl-ff"></div>
  <div class="title">「<span id="t-ff-title"></span>」の強度は？</div>
  <div class="score-num" id="num-ff" style="color:#C47A5A">0.000</div>
  <div class="slider-wrap">
    <input type="range" min="0" max="100" step="0.001" value="0" id="sl-ff" oninput="document.getElementById('num-ff').textContent=parseFloat(this.value).toFixed(3)">
    <div class="slider-labels"><span>0</span><span>100</span></div>
  </div>
  <button class="btn" onclick="showResult()">結果を見る</button>
</div>

<!-- Result -->
<div class="screen" id="s-result">
  <div class="result-block">
    <div class="label">完了</div>
                    <div id="r-normal" style="display:none">
      <div class="r-row">
        <span class="r-label" id="lbl-a" style="color:#6B9080"></span>
        <span class="r-arrow" id="arr-a"></span>
        <span class="r-nums">
          <span class="r-before" id="r-ia"></span>
          <span class="r-sep">→</span>
          <span class="r-after" id="r-fa"></span>
        </span>
      </div>
      <div class="r-row">
        <span class="r-label" id="lbl-f" style="color:#C47A5A"></span>
        <span class="r-arrow" id="arr-f"></span>
        <span class="r-nums">
          <span class="r-before" id="r-if"></span>
          <span class="r-sep">→</span>
          <span class="r-after" id="r-ff"></span>
        </span>
      </div>
    </div>
    <div id="r-muryou" style="display:none;text-align:center">
      <div style="font-family:'Noto Serif JP',serif;font-size:2rem;font-weight:700;color:#6B9080;letter-spacing:.15em">無量</div>
      <div style="font-family:'Noto Serif JP',serif;font-size:.95rem;color:#6B9080;margin-top:.7rem;letter-spacing:.12em;font-weight:300">差が消融した</div>
      <div style="font-size:.75rem;color:#B8B8B0;margin-top:.8rem;letter-spacing:.08em;font-family:'Noto Serif JP',serif">必要なときだけ、どうぞ</div>
    </div>
    <div style="margin-top:1.8rem;display:flex;flex-direction:column;align-items:center;gap:.5rem">
      <button onclick="shareResult()" style="display:inline-flex;align-items:center;gap:.38rem;background:none;border:none;color:#A8A8A0;cursor:pointer;padding:.4rem .8rem;font-family:'Noto Serif JP',serif;font-size:.78rem;letter-spacing:.1em"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="7.5,1 7.5,9.5"/><polyline points="4,4 7.5,1 11,4"/><path d="M2.5,7.5v5.5h10V7.5"/></svg>Share</button>
      <button class="btn-ghost" onclick="restart()" style="border-color:#DDD;color:#CCC;font-size:.78rem;margin-top:0">もう一度</button>
      <button onclick="startProFlow()" style="background:none;border:none;font-family:'Noto Serif JP',serif;font-size:.82rem;color:#A0A09A;letter-spacing:.12em;cursor:pointer;margin-top:.5rem;padding:.3rem .8rem">カスタム</button>
    </div>
  </div>
</div>

<div class="pwa-prompt" id="pwa-prompt">
  <div class="pwa-text">ホームに追加すると、すぐに開けます</div>
  <div class="pwa-btns">
    <button class="pwa-add" onclick="pwaAdd()">追加する</button>
    <button class="pwa-later" onclick="pwaLater()">後で</button>
  </div>
</div>

<script>
function bcPro(phase){
  // phase: 0=before-measure, 1=corner-select, 2=in-corner, 3=after-measure
  if(phase===2) return ''; // handled by caller with corner number
  const sep='<span class="sep">›</span>';
  const parts=['測定','コーナー処理','測定'];
  const active=[0,1,3][phase<3?phase:2];
  return parts.map((t,i)=>i===active?'<span class="ph">'+t+'</span>':t).join(sep);
}
function setLbl(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}

// ── Round definitions (all 4) ──
function getRD(){
  return [
    {
      a:`この世界に、「${W.neg}」のみが存在するとしたら、<br>あなたはどんな状態？`,
      b:(a)=>`「${a}」の外にいる時、<br>あなたはどんな状態？`
    },
    {
      a:`この世界に、「${W.pos}」が存在しないとしたら、<br>あなたはどんな状態？`,
      b:(a)=>`「${a}」の外にいる時、<br>あなたはどんな状態？`
    },
    {
      a:`この世界に、「${W.neg}」が存在しないとしたら、<br>あなたはどんな状態？`,
      b:(a)=>`「${a}」の内にいる時、<br>あなたはどんな状態？`
    },
    {
      a:`この世界に、「${W.pos}」のみが存在するとしたら、<br>あなたはどんな状態？`,
      b:(a)=>`「${a}」の内にいる時、<br>あなたはどんな状態？`
    }
  ];
}

const S = {
  ia:0, ifa:0, fa:0, ff:0, muryou:false,
  curCorner: null,       // which corner is active
  done: [false,false,false,false], // cleared corners
  rounds: [{},{},{},{}], // {a,b} per corner
  breathing: false, bc: 0
};

let cur='s-intro', hist=[];

// ── Persist ──
function ls(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k));localStorage.setItem(k,JSON.stringify(v));}catch(e){return null;}}

// ── Nav ──
function go(id){
  const c=document.getElementById(cur),n=document.getElementById(id);
  if(!c||!n)return;
  c.classList.remove('active');c.classList.add('exit');
  setTimeout(()=>c.classList.remove('exit'),500);
  setTimeout(()=>{
    n.classList.add('active');cur=id;
    backBtn();saveDraft();
    const inp=n.querySelector('.text-input');if(inp)setTimeout(()=>inp.focus(),400);
  },120);
}
function fwd(id){hist.push(cur);go(id);}

function goBack(){
  const p=hist.pop();
  if(!p||p==='s-intro'){restart();return;}
  // If going back from a round screen to corners, reset breathing state
  if(p==='s-corners'){S.breathing=false;S.bc=0;}
  const c=document.getElementById(cur),n=document.getElementById(p);
  c.classList.remove('active');c.classList.add('exit');
  setTimeout(()=>c.classList.remove('exit'),500);
  setTimeout(()=>{n.classList.add('active');cur=p;backBtn();},120);
}

function backBtn(){
  document.getElementById('btn-back').classList.toggle('visible',
    cur!=='s-intro'&&cur!=='s-result'&&cur!=='s-corners');
}

// ── Intro ──

const THEMES = [
  { a:'＊', b:'＊',           active:true  },
  { a:'自信', b:'自己不信',    active:false },
  { a:'自己肯定', b:'自己否定', active:false },
  { a:'快',   b:'不快',        active:false },
  { a:'充足', b:'不足',        active:false }
];

function buildThemeList(){
  const list=document.getElementById('theme-list');
  list.innerHTML='';
  THEMES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='theme-btn '+(t.active?'t-active':'t-locked');
    btn.innerHTML='<span class="th-main">'+t.a+' — '+t.b+'</span><span class="th-sub">チューニング</span>';
    if(t.active) btn.onclick=()=>fwd('s-ia');
    list.appendChild(btn);
  });
}


// ── Custom words
const W = { pos: 'ポジティブワード', neg: 'ネガティブワード' };



function applyWords(){
  const p=W.pos, n=W.neg;
  ['t-ia-title','t-fa-title'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=p;});
  ['t-if-title','t-ff-title'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=n;});
  const la=document.getElementById('lbl-a'),lf=document.getElementById('lbl-f');
  if(la)la.textContent=p; if(lf)lf.textContent=n;
  const cl=[
    'ネガのみ<br>↓ 外',
    'ポジなし<br>↓ 外',
    'ネガなし<br>↓ 内',
    'ポジのみ<br>↓ 内'
  ];
  cl.forEach((t,i)=>{const el=document.getElementById('cl-'+i);if(el)el.innerHTML=t;});
}

function saveWords(){
  const p=document.getElementById('word-pos').value.trim();
  const n=document.getElementById('word-neg').value.trim();
  if(!p||!n){
    const emp=!p?'word-pos':'word-neg';
    const el=document.getElementById(emp);
    if(el){el.style.borderBottomColor='#C47A5A';el.focus();}
    return;
  }
  W.pos=p; W.neg=n;
  applyWords();
  setLbl('lbl-ia',bcPro(0));setLbl('lbl-if',bcPro(0));
  setLbl('lbl-fa',bcPro(3));setLbl('lbl-ff',bcPro(3));
  fwd('s-ia');
}


function saveDraft(){
  if(cur==='s-intro'||cur==='s-result'){localStorage.removeItem('ntp_draft');return;}
  ls('ntp_draft',{cur,ri:S.ri,done:S.done,rounds:S.rounds,ia:S.ia,ifa:S.ifa,hist,wp:W.pos,wn:W.neg});
}

function resumeSession(){
  const d=ls('ntp_draft');if(!d)return;
  S.ri=d.ri||0;
  S.done=d.done||[false,false,false,false];
  S.rounds=d.rounds||[{},{},{},{}];
  S.ia=d.ia||0;S.ifa=d.ifa||0;
  hist=d.hist||[];
  // Restore custom words
  if(d.wp){W.pos=d.wp;W.neg=d.wn||W.neg;
    document.querySelectorAll('.w-pos').forEach(el=>el.textContent=W.pos);
    document.querySelectorAll('.w-neg').forEach(el=>el.textContent=W.neg);
    const pi=document.getElementById('word-pos');const ni=document.getElementById('word-neg');
    if(pi)pi.value=W.pos;if(ni)ni.value=W.neg;

  }
  document.getElementById('sl-ia').value=S.ia;
  document.getElementById('num-ia').textContent=parseFloat(S.ia).toFixed(3);
  document.getElementById('sl-if').value=S.ifa;
  document.getElementById('num-if').textContent=parseFloat(S.ifa).toFixed(3);
  updateCornerGrid();
  const n=document.getElementById(d.cur);
  const c=document.getElementById(cur);
  if(c)c.classList.remove('active');
  if(n){n.classList.add('active');cur=d.cur;backBtn();}
}

function loadIntro(){
  const _d=ls('ntp_draft');
  if(_d&&_d.cur&&_d.cur!=='s-intro'){const rb=document.getElementById('resume-btn');if(rb)rb.style.display='block';}
  const last=ls('ntp_last');
  if(last){
    const p=last.wp||'',n=last.wn||'';
    let txt;
    if(last.muryou){ txt='無量'; }
    else{ txt=(p?p+' ':''+(last.fa??'?'))+'　'+(n?n+' ':''+(last.ff??'?')); }
    document.getElementById('prev-text').textContent=last.muryou?'無量':(p||'')+(last.fa??'?')+'　'+(n||'')+(last.ff??'?');
    document.getElementById('prev-badge').style.display='block';
    document.getElementById('intro-spacer').style.display='none';
  }
  const today=new Date().toISOString().slice(0,10);
  if(ls('ntp_today')===today)document.getElementById('today-badge').style.display='block';
}

function startFresh(){
  S.ia=0;S.ifa=0;S.fa=0;S.ff=0;S.muryou=false;
  S.curCorner=null;S.done=[false,false,false,false];S.rounds=[{},{},{},{}];
  S.breathing=false;S.bc=0;
  hist=[];
  setLbl('lbl-ia',bcPro(0));setLbl('lbl-if',bcPro(0));
  ['sl-ia','sl-if','sl-fa','sl-ff'].forEach(id=>document.getElementById(id).value=0);
  ['num-ia','num-if','num-fa','num-ff'].forEach(id=>document.getElementById(id).textContent='0.000');
  W.pos='ポジティブワード';W.neg='ネガティブワード';
  document.getElementById('word-pos').value='';
  document.getElementById('word-neg').value='';
  applyWords();
  fwd('s-words');
}

// ── Init ──
function onInitAnshin(){
  S.ia=parseFloat(document.getElementById('sl-ia').value).toFixed(3);
  setLbl('lbl-if',bcPro(0));fwd('s-if');
}
function onInitFuan(){
  S.ifa=parseFloat(document.getElementById('sl-if').value).toFixed(3);
  updateCornerGrid();
  setLbl('lbl-corners-hdr',bcPro(1));fwd('s-corners');
}

// ── Corner grid ──
function updateCornerGrid(){
  for(let i=0;i<4;i++){
    const el=document.getElementById('cb-'+i);
    if(S.done[i]) el.classList.add('done');
    else el.classList.remove('done');
  }
}

function startCorner(i){
  S.curCorner=i;
  const rDef=getRD()[i];
  document.getElementById('title-ra').innerHTML=rDef.a;
  document.getElementById('input-ra').value='';
  breset('btn-ra');
  setLbl('lbl-ra','コーナー '+(i+1));
  fwd('s-ra');
}

function skipRound(step){
  if(S.curCorner===null)return;
  if(step==='a'){
    // Skip entire corner
    if(!S.rounds[S.curCorner])S.rounds[S.curCorner]={};
    S.rounds[S.curCorner].a='—';
    S.rounds[S.curCorner].b='—';
    S.done[S.curCorner]=true;
    S.breathing=false;S.bc=0;
    updateCornerGrid();
    hist=hist.filter(h=>h!=='s-ra'&&h!=='s-rb'&&h!=='s-rc1'&&h!=='s-rc2');
    go('s-corners');
  } else {
    if(!S.rounds[S.curCorner])S.rounds[S.curCorner]={};
    S.rounds[S.curCorner].b='—';
    document.getElementById('focus-c1').innerHTML='「—」を感じながら<br>深呼吸1回';
    setLbl('lbl-rc1','コーナー '+(S.curCorner+1));
    rcircle('c1');S.breathing=false;S.bc=0;
    fwd('s-rc1');
  }
}

function onRoundA(){
  const v=document.getElementById('input-ra').value.trim();if(!v)return;
  S.rounds[S.curCorner].a=v;
  const rDef=getRD()[S.curCorner];
  document.getElementById('title-rb').innerHTML=rDef.b(v);
  document.getElementById('input-rb').value='';
  breset('btn-rb');
  setLbl('lbl-rb','コーナー '+(S.curCorner+1));
  fwd('s-rb');
}

function onRoundB(){
  const v=document.getElementById('input-rb').value.trim();if(!v)return;
  S.rounds[S.curCorner].b=v;
  const b=v;
  document.getElementById('focus-c1').innerHTML='回答Bを感じながら<br><em>'+b+'</em><br>深呼吸1回';
  setLbl('lbl-rc1','コーナー '+(S.curCorner+1));
  rcircle('c1');S.breathing=false;S.bc=0;
  fwd('s-rc1');
}

function goToFinal(){
  setLbl('lbl-fa',bcPro(3));setLbl('lbl-ff',bcPro(3));
  document.getElementById('sl-fa').value=0;
  document.getElementById('num-fa').textContent='0.000';
  fwd('s-fa');
}

function onFinalAnshin(){
  S.fa=parseFloat(document.getElementById('sl-fa').value).toFixed(3);
  document.getElementById('sl-ff').value=0;
  document.getElementById('num-ff').textContent='0.000';
  fwd('s-ff');
}
function setMuryou(){S.muryou=true;showResult();}

// ── Breathing (1 cycle) ──
function rcircle(t){
  const c=document.getElementById('circle-'+t);
  c.className='breath-circle pulse';c.textContent='';
  const h=document.getElementById('hint-'+t);
  if(h)h.style.display='block';
}

function startBreath(t){
  if(S.breathing)return;S.breathing=true;
  const h=document.getElementById('hint-'+t);
  if(h)h.style.display='none';
  const c=document.getElementById('circle-'+t);
  c.classList.remove('pulse');
  bcycle(t,c);
}

let wl=null;
async function awl(){if('wakeLock'in navigator)try{wl=await navigator.wakeLock.request('screen');}catch(e){}}
function rwl(){if(wl){wl.release();wl=null;}}

function bcycle(t,c){
  if(S.bc>=1){  // 1 breath only
    rwl();c.textContent='✓';c.className='breath-circle';
    setTimeout(()=>afterB(t),900);return;
  }
  awl();
  c.textContent='吸';c.className='breath-circle inhale';
  setTimeout(()=>{
    c.textContent='吐';c.className='breath-circle exhale';
    setTimeout(()=>{S.bc++;bcycle(t,c);},4000);
  },4000);
}

function afterB(t){
  if(t==='c1'){
    setLbl('lbl-rc2','コーナー '+(S.curCorner+1));
    rcircle('c2');S.breathing=false;S.bc=0;
    fwd('s-rc2');
  } else {
    // c2 done — mark corner, back to grid
    S.done[S.curCorner]=true;
    S.breathing=false;S.bc=0;
    updateCornerGrid();saveDraft();
    // pop history back to corners
    hist=hist.filter(h=>h!=='s-ra'&&h!=='s-rb'&&h!=='s-rc1'&&h!=='s-rc2');
    go('s-corners');
  }
}

// ── Result ──

function arrowSVG(dir,color){
  const p=dir==='up'
    ?'M16 3L31 20H22V39H10V20H1Z'
    :'M16 39L31 22H22V3H10V22H1Z';
  return '<svg width="30" height="38" viewBox="0 0 32 42" style="vertical-align:middle"><path d="'+p+'" fill="'+color+'"/></svg>';
}
function showResult(){
  if(!S.muryou)S.ff=parseFloat(document.getElementById('sl-ff').value).toFixed(3);
  document.getElementById('r-normal').style.display=S.muryou?'none':'block';
  document.getElementById('r-muryou').style.display=S.muryou?'block':'none';
  if(!S.muryou){
    const fmt=v=>parseFloat(v).toFixed(1)+'%';
    document.getElementById('r-ia').textContent=fmt(S.ia);
    document.getElementById('r-if').textContent=fmt(S.ifa);
    document.getElementById('r-fa').textContent=fmt(S.fa);
    document.getElementById('r-ff').textContent=fmt(S.ff);
    const dA=parseFloat(S.fa)-parseFloat(S.ia);
    const dF=parseFloat(S.ff)-parseFloat(S.ifa);
    const aCol=dA>=0?'#4A7A66':'#C47A5A';
    const fCol=dF<=0?'#C47A5A':'#4A7A66';
    document.getElementById('arr-a').innerHTML=arrowSVG(dA>=0?'up':'down','#5A8A72');
    document.getElementById('arr-f').innerHTML=arrowSVG(dF<=0?'down':'up','#C47A5A');
    ['r-ia','r-fa'].forEach(id=>document.getElementById(id).style.color='#5A8A72');
    ['r-if','r-ff'].forEach(id=>document.getElementById(id).style.color='#C47A5A');
  }
    ls('ntp_last',{ia:S.ia,ifa:S.ifa,fa:S.fa,ff:S.ff,muryou:S.muryou,wp:W.pos,wn:W.neg});
  ls('ntp_today',new Date().toISOString().slice(0,10));
  fwd('s-result');
}

function shareResult(){
  showQR();
}

// ── Restart ──
function restart(){
  hist=[];S.done=[false,false,false,false];S.muryou=false;S.breathing=false;localStorage.removeItem('ntp_draft');
  loadIntro();
  const c=document.getElementById(cur),n=document.getElementById('s-intro');
  c.classList.remove('active');c.classList.add('exit');
  setTimeout(()=>{c.classList.remove('exit');n.classList.add('active');cur='s-intro';backBtn();},120);
}

// ── Utils ──
function breset(id){const b=document.getElementById(id);b.disabled=true;b.style.opacity='.45';}
function wire(id,bid,cb){
  const inp=document.getElementById(id),btn=document.getElementById(bid);
  inp.addEventListener('input',()=>{const ok=!!inp.value.trim();btn.disabled=!ok;btn.style.opacity=ok?'1':'.45';});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&inp.value.trim())cb();});
}
wire('input-ra','btn-ra',onRoundA);
wire('input-rb','btn-rb',onRoundB);

// ── PWA ──
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();dp=e;
  if((ls('ntp_launches')||0)>=2&&!ls('ntp_pwa')){
    setTimeout(()=>{if(cur==='s-intro'&&dp)document.getElementById('pwa-text').textContent='ホームに追加すると、すぐに開けます';document.getElementById('pwa-btn-add').style.display='';document.getElementById('pwa-prompt').classList.add('show');},1500);
  }
});
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
async function pwaAdd(){
  if(isIOS){
    document.getElementById('pwa-text').textContent='Safari: 共有 → ホーム画面に追加';
    document.getElementById('pwa-btn-add').style.display='none';
    setTimeout(()=>pwaLater(),3000);
    return;
  }
  document.getElementById('pwa-prompt').classList.remove('show');
  ls('ntp_pwa',true);
  if(dp){dp.prompt();await dp.userChoice;dp=null;}
}
function pwaLater(){document.getElementById('pwa-prompt').classList.remove('show');ls('ntp_pwa',true);}


function showQR(){
  const url=window.location.href.split('?')[0];
  document.getElementById('qr-url').textContent=url;
  QRCode.toCanvas(document.getElementById('qr-canvas'),url,{
    width:200,margin:1,color:{dark:'#2A2A2A',light:'#FFFFFF'}
  });
  document.getElementById('qr-overlay').classList.add('show');
}
function closeQR(){
  document.getElementById('qr-overlay').classList.remove('show');
}

document.body.addEventListener('touchmove',e=>{if(e.target.tagName!=='INPUT')e.preventDefault();},{passive:false});
ls('ntp_launches',(ls('ntp_launches')||0)+1);
loadIntro();
</script>
</body>
</html>
